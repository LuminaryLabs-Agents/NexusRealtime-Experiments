name: Make PICO APK

on:
  workflow_dispatch:
    inputs:
      device_ip:
        description: 'Optional PICO headset IP address. Leave empty to discover over USB on the self-hosted runner.'
        required: false
        type: string
      adb_serial:
        description: 'Optional adb serial, e.g. 192.168.1.25:5555 or USB serial. Overrides discovery.'
        required: false
        type: string
      adb_port:
        description: 'ADB TCP port.'
        required: false
        default: '5555'
        type: string
      launch_after_install:
        description: 'Launch the app after install.'
        required: false
        default: true
        type: boolean

  issues:
    types: [opened]

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: make-pico-apk
  cancel-in-progress: false

env:
  DEPLOY_ISSUE_TITLE: '[PICO_DEPLOY] make PICO apk'
  DEPLOY_ISSUE_LABEL: pico-deploy
  PACKAGE_NAME: dev.luminarylabs.spatialauthoring.openxr

jobs:
  guard:
    name: Validate trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
      device_ip: ${{ steps.guard.outputs.device_ip }}
      adb_serial: ${{ steps.guard.outputs.adb_serial }}
      adb_port: ${{ steps.guard.outputs.adb_port }}
      launch_after_install: ${{ steps.guard.outputs.launch_after_install }}
    steps:
      - id: guard
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let shouldRun = false;
            let deviceIp = core.getInput('device_ip') || '';
            let adbSerial = core.getInput('adb_serial') || '';
            let adbPort = core.getInput('adb_port') || '5555';
            let launchAfterInstall = core.getInput('launch_after_install') || 'true';

            if (eventName === 'workflow_dispatch') {
              shouldRun = true;
            }

            if (eventName === 'issues') {
              const issue = context.payload.issue;
              const allowed = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
              const titleOk = issue?.title === process.env.DEPLOY_ISSUE_TITLE;
              const labelOk = (issue?.labels ?? []).some((label) => label.name === process.env.DEPLOY_ISSUE_LABEL);
              const actorOk = allowed.has(issue?.author_association);
              shouldRun = Boolean(titleOk && labelOk && actorOk);

              const body = issue?.body ?? '';
              const read = (name, fallback = '') => {
                const match = body.match(new RegExp(`^${name}:\\s*(.+)$`, 'mi'));
                return match ? match[1].trim() : fallback;
              };
              deviceIp = read('device_ip', '');
              adbSerial = read('adb_serial', '');
              adbPort = read('adb_port', '5555');
              launchAfterInstall = read('launch_after_install', 'true');

              if (!shouldRun) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: 'PICO deploy was ignored. Required: exact title `[PICO_DEPLOY] make PICO apk`, label `pico-deploy`, and author association OWNER/MEMBER/COLLABORATOR.'
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: 'Accepted PICO deploy request. Building APK, then deploying from the self-hosted `pico` runner.'
                });
              }
            }

            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.setOutput('device_ip', deviceIp);
            core.setOutput('adb_serial', adbSerial);
            core.setOutput('adb_port', adbPort || '5555');
            core.setOutput('launch_after_install', String(launchAfterInstall).toLowerCase() !== 'false' ? 'true' : 'false');

  build-apk:
    name: Build Spatial Authoring OpenXR APK
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Install Gradle
        run: |
          curl -L -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q /tmp/gradle.zip -d /tmp
          echo "/tmp/gradle-8.10.2/bin" >> "$GITHUB_PATH"

      - name: Build APK
        working-directory: native/spatial-authoring-openxr-apk
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spatial-authoring-openxr-debug-apk
          path: native/spatial-authoring-openxr-apk/app/build/outputs/apk/debug/app-debug.apk

  deploy-to-pico:
    name: Install APK on PICO headset
    needs: [guard, build-apk]
    if: needs.guard.outputs.should_run == 'true'
    runs-on: [self-hosted, pico]
    timeout-minutes: 20
    env:
      ADB_PORT: ${{ needs.guard.outputs.adb_port }}
      INPUT_DEVICE_IP: ${{ needs.guard.outputs.device_ip }}
      INPUT_ADB_SERIAL: ${{ needs.guard.outputs.adb_serial }}
      LAUNCH_AFTER_INSTALL: ${{ needs.guard.outputs.launch_after_install }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spatial-authoring-openxr-debug-apk
          path: ./apk

      - name: Verify adb is available
        run: |
          set -euo pipefail
          command -v adb
          adb version

      - name: Resolve PICO adb target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          adb start-server >/dev/null

          if [[ -n "${INPUT_ADB_SERIAL}" ]]; then
            echo "serial=${INPUT_ADB_SERIAL}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "${INPUT_DEVICE_IP}" ]]; then
            adb connect "${INPUT_DEVICE_IP}:${ADB_PORT}"
            echo "serial=${INPUT_DEVICE_IP}:${ADB_PORT}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          USB_DEVICE=$(adb devices | awk 'NR > 1 && $2 == "device" && $1 !~ /:/ { print $1; exit }')
          if [[ -z "${USB_DEVICE}" ]]; then
            echo "No authorized USB PICO/Android device found on the self-hosted runner."
            echo "Connect the headset by USB, enable USB debugging, and accept the RSA prompt."
            exit 1
          fi

          DEVICE_IP=$(adb -s "${USB_DEVICE}" shell ip route 2>/dev/null | awk '/wlan|scope/ { for (i=1;i<=NF;i++) if ($i=="src") { print $(i+1); exit } }')
          if [[ -z "${DEVICE_IP}" ]]; then
            DEVICE_IP=$(adb -s "${USB_DEVICE}" shell ip addr show wlan0 2>/dev/null | awk '/inet / { split($2,a,"/"); print a[1]; exit }')
          fi
          if [[ -z "${DEVICE_IP}" ]]; then
            echo "Could not detect headset Wi-Fi IP from USB device ${USB_DEVICE}."
            exit 1
          fi

          adb -s "${USB_DEVICE}" tcpip "${ADB_PORT}" >/dev/null
          sleep 2
          adb connect "${DEVICE_IP}:${ADB_PORT}"
          echo "serial=${DEVICE_IP}:${ADB_PORT}" >> "$GITHUB_OUTPUT"

      - name: Install APK
        shell: bash
        run: |
          set -euo pipefail
          APK=$(find ./apk -name '*.apk' -type f | head -n 1)
          if [[ -z "${APK}" ]]; then
            echo "No APK artifact found."
            exit 1
          fi
          adb -s "${{ steps.target.outputs.serial }}" install -r "${APK}"

      - name: Launch app
        if: env.LAUNCH_AFTER_INSTALL == 'true'
        shell: bash
        run: |
          set -euo pipefail
          adb -s "${{ steps.target.outputs.serial }}" shell monkey -p "${PACKAGE_NAME}" -c android.intent.category.LAUNCHER 1

      - name: Capture launch logs
        if: always()
        shell: bash
        run: |
          set +e
          adb -s "${{ steps.target.outputs.serial }}" logcat -d -t 250 | grep -E 'SpatialAuthoringOpenXR|AndroidRuntime|OpenXR|FATAL EXCEPTION' || true

  issue-summary:
    name: Comment issue result
    needs: [guard, build-apk, deploy-to-pico]
    if: always() && github.event_name == 'issues' && needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.deploy-to-pico.result }}';
            const body = result === 'success'
              ? 'PICO deploy completed. APK was installed and launch was attempted on the headset.'
              : `PICO deploy did not complete successfully. Deploy job result: ${result}. Check the workflow logs.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });
            if (result === 'success') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }
