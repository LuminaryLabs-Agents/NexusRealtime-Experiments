<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="description" content="Live NexusRealtime endpoint for The Cavalry of Rome formation-command experiment." />
  <title>The Cavalry of Rome — NexusRealtime</title>
  <style>
    :root{color-scheme:dark;--panel:rgba(18,12,6,.82);--edge:rgba(255,223,167,.22);--text:#fff6e3;--muted:#e8c997;--accent:#f6d078}
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#070503;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #app,#game{position:fixed;inset:0;width:100%;height:100%}#game{display:block;cursor:crosshair;touch-action:none}
    #hud{position:fixed;left:18px;top:18px;z-index:4;width:min(420px,calc(100vw - 36px));display:grid;gap:10px;pointer-events:none;text-shadow:0 2px 14px rgba(0,0,0,.8)}
    .panel{border:1px solid var(--edge);border-radius:18px;background:var(--panel);box-shadow:0 22px 80px rgba(0,0,0,.38),inset 0 0 0 1px rgba(255,255,255,.04);-webkit-backdrop-filter:blur(16px) saturate(1.25);backdrop-filter:blur(16px) saturate(1.25)}
    h1{margin:0;padding:12px 14px 8px;color:#fffaf0;font-size:.92rem;letter-spacing:.11em;text-transform:uppercase}#status,#readout{margin:0;padding:0 14px 12px;color:var(--muted);font-size:.86rem;line-height:1.42}
    #commandBar{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:12px;pointer-events:auto}#commandBar[hidden]{display:none}
    button{border:1px solid rgba(255,224,169,.26);border-radius:12px;padding:9px 10px;background:rgba(255,235,190,.08);color:var(--text);font-weight:780;letter-spacing:.02em;cursor:pointer}button:hover,button:focus-visible{outline:none;background:rgba(246,208,120,.18);border-color:rgba(246,208,120,.62)}button:disabled{cursor:not-allowed;opacity:.44}
    #footer{position:fixed;left:18px;bottom:18px;z-index:4;max-width:min(760px,calc(100vw - 36px));padding:10px 13px;color:var(--muted);font-size:.82rem;line-height:1.35;pointer-events:none}
    @media(max-width:720px){#hud{left:10px;top:10px;width:calc(100vw - 20px)}#commandBar{grid-template-columns:repeat(4,minmax(0,1fr));overflow-x:auto}button{min-width:110px}#footer{left:10px;right:10px;bottom:10px}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <main id="app">
    <canvas id="game" role="application" aria-label="The Cavalry of Rome game canvas"></canvas>
    <aside id="hud" aria-label="Game state">
      <section class="panel"><h1>The Cavalry of Rome</h1><p id="status" aria-live="polite">Loading campaign…</p><p id="readout"></p></section>
      <section id="commandBar" class="panel" aria-label="Formation commands" hidden></section>
    </aside>
    <footer id="footer" class="panel">Campaign: click linked towns to march. Encounter: click a Roman formation, then issue formation orders. Press R to reload.</footer>
  </main>
  <script type="module">
    import { attachNexusRealtimePageLoader } from "../../experiments/_shared/nexus-realtime-page-loader.js";
    attachNexusRealtimePageLoader({ title: "The Cavalry of Rome", loadingLabel: "Loading The Cavalry of Rome" });
  </script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/main.js"></script>
</body>
</html>
