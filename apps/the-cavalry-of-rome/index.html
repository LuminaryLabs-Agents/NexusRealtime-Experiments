<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="description" content="Live NexusRealtime endpoint for The Cavalry of Rome realistic terrain visual experiment." />
  <title>The Cavalry of Rome — NexusRealtime</title>
  <style>
    :root{color-scheme:dark;background:#070503}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#070503;color:#fff6e3;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #app,#game{position:fixed;inset:0;width:100%;height:100%}
    #game{display:block;cursor:crosshair;touch-action:none}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <main id="app">
    <canvas id="game" role="application" aria-label="The Cavalry of Rome realistic terrain canvas"></canvas>
  </main>
  <script>
    var selectedUnitId = null;
    (() => {
      const sinks = new Map([
        ["#status", { textContent: "" }],
        ["#readout", { textContent: "" }],
        ["#commandBar", { hidden: true, textContent: "" }]
      ]);
      const querySelector = Document.prototype.querySelector;
      Document.prototype.querySelector = function cavalryUiFreeQuerySelector(selector) {
        if (sinks.has(selector)) return sinks.get(selector);
        return querySelector.call(this, selector);
      };
      window.CavalryUiSinkShim = { version: "0.1.0", hiddenDom: false, visibleUi: false, selectors: [...sinks.keys()] };
    })();
  </script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/main-realistic.js"></script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/vegetation-pass.js"></script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/hex-battlefield-pass.js"></script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/hex-squad-visual-pass.js"></script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/hex-gameplay-pass.js"></script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/hex-action-ui-pass.js?v=dice-object-001"></script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/hex-roll-controller-pass.js"></script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/hex-opponent-ai-pass.js"></script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/hex-combat-controller-pass.js?v=dice-object-001"></script>
  <script type="module" src="../../experiments/The%20Cavalry%20of%20Rome/src/hex-dice-visual-fix-pass.js?v=dice-object-001"></script>
</body>
</html>
