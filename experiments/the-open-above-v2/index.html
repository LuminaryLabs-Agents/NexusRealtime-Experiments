<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="The Open Above V2, a clean NexusRealtime flight harness composed from generic ProtoKits." />
  <title>The Open Above V2</title>
  <style>
    html,body { margin:0; height:100%; overflow:hidden; background:#dff7ff; color:#eef9ff; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    #game { width:100vw; height:100vh; display:block; touch-action:none; }
    .hud {
      position:fixed; left:16px; bottom:16px; z-index:2; max-width:min(420px,calc(100vw - 32px));
      padding:10px 12px; border:1px solid rgba(255,255,255,.16); border-radius:16px;
      background:linear-gradient(180deg,rgba(3,12,17,.42),rgba(3,9,12,.26)); backdrop-filter:blur(12px);
      color:rgba(239,250,255,.84); font-size:12px; letter-spacing:.02em; line-height:1.4;
      text-shadow:0 1px 2px rgba(0,0,0,.55); pointer-events:none;
    }
    .hud strong { color:#fff4bd; font-weight:900; }
    #error { position:fixed; inset:16px; z-index:4; overflow:auto; white-space:pre-wrap; padding:16px; color:#ffdfd7; background:rgba(20,0,0,.82); border:1px solid rgba(255,120,90,.4); border-radius:18px; }
    #error[hidden] { display:none; }
  </style>
</head>
<body>
  <canvas id="game" aria-label="The Open Above V2 flight harness"></canvas>
  <div class="hud" id="hud"><strong>The Open Above V2</strong><br>W/S pitch · A/D bank · Space boost</div>
  <pre id="error" hidden></pre>
  <script type="module" src="./open-above-v2.js"></script>
</body>
</html>
