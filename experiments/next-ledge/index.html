<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Next Ledge — NexusRealtime Experiment</title>
  <style>
    :root { --ink:#03070b; --cyan:#00f0ff; --amber:#ffb83d; --danger:#ff5a5a; --panel:rgba(3,7,11,.74); --line:rgba(0,240,255,.28); }
    *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--ink);color:white;font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif}
    main#app,canvas#game,aside#hud{position:fixed;inset:0} canvas#game{display:block;width:100vw;height:100vh;cursor:crosshair;touch-action:none} aside#hud{pointer-events:none;z-index:10}
    #status{position:fixed;left:16px;top:14px;max-width:min(520px,calc(100vw - 32px));padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel);backdrop-filter:blur(12px);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);text-shadow:0 0 10px rgba(0,240,255,.45)}
    #readout{position:fixed;left:16px;bottom:14px;max-width:min(680px,calc(100vw - 32px));padding:8px 10px;border:1px solid rgba(255,184,61,.25);border-radius:10px;background:var(--panel);backdrop-filter:blur(12px);font-size:11px;letter-spacing:.07em;color:rgba(255,255,255,.78)} #readout strong{color:var(--amber)}
    #errorPanel{position:fixed;z-index:30;left:18px;right:18px;bottom:18px;padding:14px;border:1px solid var(--danger);border-radius:12px;background:rgba(80,0,0,.82);color:white;white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,monospace} #errorPanel[hidden]{display:none}
    #mobileControls{position:fixed;inset:0;z-index:12;pointer-events:none;display:none}.pad{position:absolute;bottom:92px;width:72px;height:72px;border:1px solid var(--line);border-radius:50%;background:rgba(3,7,11,.64);color:var(--cyan);display:grid;place-items:center;font-size:24px;font-weight:900;pointer-events:auto;user-select:none}.pad:active{background:var(--cyan);color:var(--ink)}#leftPad{left:24px}#rightPad{right:24px}
    @media (max-width:780px),(pointer:coarse){#mobileControls{display:block}#readout{font-size:10px}}
  </style>
</head>
<body>
  <main id="app">
    <canvas id="game" role="application" aria-label="Next Ledge game canvas"></canvas>
    <aside id="hud" aria-label="Game HUD"><header id="status" aria-live="polite">Loading NexusRealtime kits…</header><footer id="readout">CLICK/TAP: release or fire · A/D: swing momentum · R: restart</footer></aside>
    <div id="mobileControls" aria-hidden="true"><div id="leftPad" class="pad">◀</div><div id="rightPad" class="pad">▶</div></div>
    <section id="errorPanel" role="alert" hidden></section>
  </main>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
