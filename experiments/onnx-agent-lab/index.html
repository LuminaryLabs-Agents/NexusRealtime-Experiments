<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ONNX Agent Lab</title>
  <style>
    :root{color-scheme:dark;--bg:#070a12;--panel:rgba(8,13,22,.78);--line:rgba(131,216,255,.22);--text:#edf7ff;--muted:#94a8b6;--blue:#83d8ff;--gold:#ffe36d;--green:#87f5bf;--red:#ff8b7b}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 70% 20%,rgba(131,216,255,.16),transparent 34rem),linear-gradient(145deg,#070a12,#0c111d 58%,#03050a);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,sans-serif}body{min-height:100svh;display:grid;place-items:center;padding:18px}.shell{width:min(100%,980px);height:min(820px,calc(100svh - 36px));display:grid;grid-template-rows:auto 1fr auto;gap:12px}.top,.chat,.composer{border:1px solid var(--line);background:var(--panel);box-shadow:0 30px 100px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(18px)}.top{border-radius:24px;padding:14px 16px;display:flex;justify-content:space-between;gap:16px;align-items:center}.brand strong{display:block;color:var(--gold);letter-spacing:.14em;text-transform:uppercase}.brand span{display:block;margin-top:4px;color:var(--muted);font-size:.86rem}.model{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid rgba(131,216,255,.26);border-radius:999px;padding:7px 10px;color:var(--blue);font-size:.76rem;font-weight:900;text-transform:uppercase}.chat{border-radius:24px;padding:18px;overflow:auto;display:flex;flex-direction:column;gap:12px}.msg{max-width:82%;padding:12px 14px;border-radius:18px;line-height:1.45;white-space:pre-wrap}.user{align-self:flex-end;background:rgba(255,227,109,.12);border:1px solid rgba(255,227,109,.28)}.bot{align-self:flex-start;background:rgba(131,216,255,.09);border:1px solid rgba(131,216,255,.22)}.sys{align-self:center;max-width:100%;font-size:.82rem;color:var(--muted);border:1px dashed rgba(255,255,255,.18);background:rgba(255,255,255,.04)}.composer{border-radius:24px;padding:12px;display:grid;grid-template-columns:auto auto 1fr auto;gap:10px;align-items:center}button,input{font:inherit}button{border:1px solid rgba(255,227,109,.4);border-radius:999px;color:#07110d;background:linear-gradient(90deg,var(--gold),var(--green));font-weight:950;padding:10px 13px;cursor:pointer}button.secondary{color:var(--blue);background:rgba(131,216,255,.07);border-color:rgba(131,216,255,.26)}button.danger{color:var(--red);background:rgba(255,139,123,.08);border-color:rgba(255,139,123,.3)}button:disabled{opacity:.45;cursor:not-allowed}input{min-width:0;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(0,0,0,.28);color:var(--text);padding:11px 14px}.meter{height:4px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.bar{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--gold));transition:width .2s}.tiny{font-size:.76rem;color:var(--muted)}#error{position:fixed;right:14px;bottom:14px;max-width:min(560px,90vw);white-space:pre-wrap;color:#ffd5cd;background:#3b0c08;border:1px solid #ff8b7b;border-radius:14px;padding:12px;font-size:12px}#error[hidden]{display:none}@media(max-width:720px){.composer{grid-template-columns:1fr 1fr}.composer input{grid-column:1/-1}.composer button:last-child{grid-column:1/-1}.msg{max-width:94%}}
  </style>
</head>
<body>
  <main class="shell" aria-label="ONNX Agent Lab chat interface">
    <header class="top">
      <div class="brand"><strong>ONNX Agent Lab</strong><span>Browser chat over a disposable ONNX text-generation pipeline.</span></div>
      <div class="model"><span class="pill" id="modelPill">Xenova/distilgpt2</span><span class="pill" id="statusPill">not loaded</span></div>
    </header>
    <section class="chat" id="chat" aria-live="polite"></section>
    <footer class="composer">
      <button id="loadBtn">Load</button>
      <button class="danger" id="disposeBtn" disabled>Dispose</button>
      <input id="prompt" value="Tell me a short idea for an agent NPC in NexusRealtime." aria-label="Chat prompt" />
      <button id="sendBtn" disabled>Send</button>
      <div class="meter" style="grid-column:1/-1"><div class="bar" id="bar"></div></div>
      <div class="tiny" id="trace" style="grid-column:1/-1">Model selected: Xenova/distilgpt2. Uses Transformers.js, which runs compatible models through ONNX Runtime in the browser.</div>
    </footer>
    <section id="error" role="alert" hidden></section>
  </main>
  <script type="module">
    const MODEL_ID='Xenova/distilgpt2';
    const TRANSFORMERS_URL='https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.1/dist/transformers.min.js';
    const chat=document.querySelector('#chat');const prompt=document.querySelector('#prompt');const loadBtn=document.querySelector('#loadBtn');const disposeBtn=document.querySelector('#disposeBtn');const sendBtn=document.querySelector('#sendBtn');const statusPill=document.querySelector('#statusPill');const bar=document.querySelector('#bar');const trace=document.querySelector('#trace');const errorPanel=document.querySelector('#error');
    let generator=null;let loading=false;let turns=[];let modelState={modelId:MODEL_ID,status:'not-loaded',progress:0,loadedAt:null,disposedAt:null,backend:'transformers.js/onnxruntime-web'};
    function setStatus(status){modelState.status=status;statusPill.textContent=status;trace.textContent=`${MODEL_ID} | ${status} | ${Math.round((modelState.progress||0)*100)}% | ${modelState.backend}`;}
    function setProgress(value){modelState.progress=Math.max(0,Math.min(1,Number(value)||0));bar.style.width=`${Math.round(modelState.progress*100)}%`;setStatus(modelState.status)}
    function addMessage(kind,text){turns.push({kind,text,at:new Date().toISOString()});const node=document.createElement('article');node.className=`msg ${kind}`;node.textContent=text;chat.append(node);chat.scrollTop=chat.scrollHeight;return node}
    function showError(error){errorPanel.hidden=false;errorPanel.textContent=String(error?.stack||error?.message||error)}
    function clearError(){errorPanel.hidden=true;errorPanel.textContent=''}
    function fallbackReply(input){const clean=String(input||'').trim();return `Dry fallback: the ONNX pipeline is not loaded, but the chat contract is active. Prompt received: "${clean}". Load ${MODEL_ID} to generate with the browser ONNX pipeline.`}
    async function loadModel(){if(generator||loading)return;clearError();loading=true;loadBtn.disabled=true;sendBtn.disabled=true;disposeBtn.disabled=true;setProgress(0.02);setStatus('loading');addMessage('sys',`Loading ${MODEL_ID}. First load can take a while because model files are downloaded and cached by the browser.`);try{const mod=await import(TRANSFORMERS_URL);const {pipeline,env}=mod;env.allowLocalModels=false;env.useBrowserCache=true;generator=await pipeline('text-generation',MODEL_ID,{dtype:'q8',progress_callback:(event)=>{if(event?.progress!=null)setProgress(Number(event.progress)/100);else if(event?.status==='ready')setProgress(1);}});modelState.loadedAt=new Date().toISOString();setProgress(1);setStatus('loaded');addMessage('sys','Model loaded. You can chat now. Dispose releases the active pipeline reference and marks the session unloaded.');sendBtn.disabled=false;disposeBtn.disabled=false}catch(error){showError(error);setStatus('load-failed');addMessage('sys','Load failed. The fallback chat remains available; check browser CORS/network/WebAssembly support.');sendBtn.disabled=false}finally{loading=false;loadBtn.disabled=false}}
    async function send(){const text=prompt.value.trim();if(!text)return;clearError();addMessage('user',text);prompt.value='';sendBtn.disabled=true;try{if(!generator){addMessage('bot',fallbackReply(text));return}setStatus('generating');const instruction=`User: ${text}\nAssistant:`;const out=await generator(instruction,{max_new_tokens:48,do_sample:true,temperature:0.8,top_k:30,repetition_penalty:1.12});const raw=out?.[0]?.generated_text??'';const reply=raw.includes('Assistant:')?raw.split('Assistant:').slice(1).join('Assistant:').trim():raw.replace(instruction,'').trim();addMessage('bot',reply||'(model produced no visible text)');setStatus('loaded')}catch(error){showError(error);addMessage('bot',fallbackReply(text));setStatus(generator?'error':'not-loaded')}finally{sendBtn.disabled=false}}
    function dispose(){if(generator?.dispose&&typeof generator.dispose==='function')generator.dispose();generator=null;modelState.disposedAt=new Date().toISOString();setProgress(0);setStatus('disposed');disposeBtn.disabled=true;sendBtn.disabled=true;addMessage('sys','Disposed active ONNX chat pipeline. Press Load to recreate it.');}
    loadBtn.addEventListener('click',loadModel);sendBtn.addEventListener('click',send);disposeBtn.addEventListener('click',dispose);prompt.addEventListener('keydown',event=>{if(event.key==='Enter')send()});
    addMessage('sys','Pick: Xenova/distilgpt2. It is small enough for a browser proof and has ONNX weights compatible with Transformers.js text generation. It is not instruction-tuned, so this is a loader/chat mechanics test, not a smart assistant demo.');
    window.GameHost={getState:()=>JSON.parse(JSON.stringify({modelState,turns,loaded:Boolean(generator)})),loadModel,send,dispose};
  </script>
</body>
</html>
