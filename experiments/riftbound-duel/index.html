<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Riftbound Duel is a third-person point-and-click magic duel prototype with reliable camera-relative controls, soft target focus, red mountains, and single-player AI bot mode." />
  <title>Riftbound Duel · NexusRealtime</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #08030f; color: #f8f0df; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; }
    .riftbound-hud { position: fixed; top: 16px; left: 16px; width: min(360px, calc(100vw - 32px)); z-index: 4; padding: 14px; border: 1px solid rgba(255, 158, 83, .35); border-radius: 18px; background: rgba(9, 4, 17, .78); box-shadow: 0 24px 90px rgba(0,0,0,.42); backdrop-filter: blur(14px); }
    .hud-title { color: #ffd66e; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
    .hud-row { display: flex; align-items: center; justify-content: space-between; color: #e8d8c3; font-size: .86rem; font-weight: 800; margin-top: 8px; }
    .hud-bar { height: 9px; margin-top: 4px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.09); }
    .hud-bar i { display: block; height: 100%; width: 100%; border-radius: inherit; background: linear-gradient(90deg, #ff6259, #ffd66e); transition: width .14s ease; }
    .hud-bar.mana i { background: linear-gradient(90deg, #50c8ff, #b26dff); }
    .hud-bar.enemy i { background: linear-gradient(90deg, #ff4ecb, #ff8050); }
    .hud-status { margin-top: 11px; color: #c9b9cf; font-size: .78rem; line-height: 1.35; }
    .riftbound-reticle { position: fixed; width: 18px; height: 18px; margin: -9px 0 0 -9px; z-index: 3; pointer-events: none; border: 2px solid rgba(255, 214, 110, .85); border-radius: 999px; box-shadow: 0 0 18px rgba(255, 145, 82, .9); }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Riftbound Duel game canvas"></canvas>
  <div class="riftbound-reticle" id="reticle" aria-hidden="true"></div>
  <script type="module" src="./game.js"></script>
</body>
</html>
