<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Living Agent Lab</title>
  <style>
    :root{color-scheme:dark;--bg:#07110f;--panel:rgba(5,10,8,.7);--line:rgba(255,227,109,.28);--text:#f7f3df;--muted:#9db2a8;--gold:#ffe36d;--green:#8df2bd;--blue:#83d8ff;--red:#ff8b7b}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 66% 22%,rgba(255,227,109,.12),transparent 30rem),linear-gradient(135deg,#07110f,#111a14 58%,#030504);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,sans-serif}main{position:relative;width:100vw;height:100vh}canvas{display:block;width:100vw;height:100vh}.hud{position:fixed;inset:14px;pointer-events:none}.top{position:absolute;left:0;right:0;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.pill,.panel{border:1px solid var(--line);border-radius:18px;background:var(--panel);box-shadow:0 18px 60px rgba(0,0,0,.34);backdrop-filter:blur(16px)}.pill{padding:9px 12px;font-size:12px;font-weight:900;letter-spacing:.04em;color:var(--gold)}.panel{position:absolute;right:0;top:52px;width:min(410px,calc(100vw - 28px));padding:12px;font-size:12px;color:var(--muted);display:grid;gap:8px}.actions{position:absolute;left:0;bottom:0;display:flex;flex-wrap:wrap;gap:8px;pointer-events:auto}button{border:1px solid rgba(255,227,109,.5);border-radius:999px;padding:10px 13px;background:rgba(255,227,109,.08);color:var(--gold);font:inherit;font-weight:950;cursor:pointer}button.primary{color:#07110d;background:linear-gradient(90deg,var(--gold),var(--green))}button:disabled{opacity:.45;cursor:not-allowed}.log{position:absolute;right:0;bottom:0;width:min(430px,calc(100vw - 28px));max-height:34vh;overflow:auto;padding:12px;border:1px solid rgba(131,216,255,.22);border-radius:18px;background:rgba(4,7,10,.62);font-size:12px;color:var(--muted);white-space:pre-wrap}.bar{height:4px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--gold))}#error{position:fixed;right:14px;bottom:14px;max-width:min(560px,90vw);white-space:pre-wrap;color:#ffd5cd;background:#3b0c08;border:1px solid #ff8b7b;border-radius:14px;padding:12px;font-size:12px}#error[hidden]{display:none}@media(max-width:760px){.panel{left:0;right:auto;top:52px}.log{left:0;right:auto;bottom:76px}.actions{right:0}.top{flex-direction:column}}
  </style>
</head>
<body>
  <main>
    <canvas id="game" aria-label="Living Agent Lab world"></canvas>
    <section class="hud" aria-label="Living agent controls">
      <div class="top"><div class="pill" id="objective">Objective: load the ONNX choice model</div><div class="pill" id="status">not loaded</div></div>
      <aside class="panel"><strong style="color:var(--gold)">Agent sees</strong><span id="vision"></span><strong style="color:var(--gold)">Available actions</strong><span id="choices"></span><div class="bar"><span id="bar"></span></div></aside>
      <nav class="actions"><button class="primary" id="loadBtn">Load ONNX Choice Model</button><button id="stepBtn" disabled>Ask Agent</button><button id="stealBtn">Player steals apple</button><button id="returnBtn">Return apple</button><button id="disposeBtn" disabled>Dispose</button></nav>
      <aside class="log" id="log">Living Agent Lab now uses one ONNX model to choose from visible state and allowed actions.</aside>
    </section>
    <section id="error" role="alert" hidden></section>
  </main>
  <script type="module">
    const MODEL_ID='Xenova/mobilebert-uncased-mnli';
    const TRANSFORMERS_URL='https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.1/dist/transformers.min.js';
    const canvas=document.querySelector('#game'),ctx=canvas.getContext('2d'),objective=document.querySelector('#objective'),statusEl=document.querySelector('#status'),visionEl=document.querySelector('#vision'),choicesEl=document.querySelector('#choices'),bar=document.querySelector('#bar'),logEl=document.querySelector('#log'),errorPanel=document.querySelector('#error');
    const loadBtn=document.querySelector('#loadBtn'),stepBtn=document.querySelector('#stepBtn'),stealBtn=document.querySelector('#stealBtn'),returnBtn=document.querySelector('#returnBtn'),disposeBtn=document.querySelector('#disposeBtn');
    let chooser=null,loading=false,autoTick=0;
    const world={tick:0,player:{x:170,y:300,label:'Player'},guard:{x:480,y:250,label:'Guard',mood:'calm',bubble:'Watching.'},merchant:{x:300,y:230,label:'Merchant',mood:'neutral'},apple:{x:310,y:330,label:'Apple',stolen:false},gate:{x:650,y:290,label:'Gate',locked:true},facts:['market is quiet'],trace:[],lastChoice:null,model:{id:MODEL_ID,status:'not-loaded',progress:0}};
    const actionMap={
      'patrol market':()=>{world.guard.bubble='I will keep walking the square.';world.guard.mood='calm';world.facts.unshift('guard patrolled market')},
      'warn player':()=>{world.guard.bubble='Careful. I am watching the market.';world.guard.mood='alert';world.facts.unshift('guard warned player')},
      'accuse player':()=>{world.guard.bubble='You took the apple. Explain yourself.';world.guard.mood='suspicious';world.facts.unshift('guard accused player')},
      'question merchant':()=>{world.guard.bubble='Merchant, what did you see?';world.merchant.mood='nervous';world.facts.unshift('guard questioned merchant')},
      'unlock gate':()=>{world.gate.locked=false;world.guard.bubble='Gate opened after risk check.';world.facts.unshift('guard unlocked gate')}
    };
    function setStatus(value){world.model.status=value;statusEl.textContent=value;objective.textContent=value==='loaded'?'Objective: change the world, then ask the ONNX agent to choose':'Objective: load the ONNX choice model'}
    function setProgress(value){world.model.progress=Math.max(0,Math.min(1,Number(value)||0));bar.style.width=Math.round(world.model.progress*100)+'%'}
    function say(line){world.trace.unshift(`[${world.tick}] ${line}`);world.trace=world.trace.slice(0,18);logEl.textContent=world.trace.join('\n')}
    function visibleState(){return [`The guard can see the player in the market.`,`Apple stolen: ${world.apple.stolen}.`,`Gate locked: ${world.gate.locked}.`,`Merchant mood: ${world.merchant.mood}.`,`Guard mood: ${world.guard.mood}.`,`Recent facts: ${world.facts.slice(0,5).join('; ')}.`].join(' ')}
    function availableActions(){const actions=['patrol market','warn player','question merchant'];if(world.apple.stolen)actions.push('accuse player');if(!world.apple.stolen&&world.gate.locked)actions.push('unlock gate');return actions}
    function fallbackChoice(){const actions=availableActions();if(world.apple.stolen&&actions.includes('accuse player'))return{label:'accuse player',score:1,source:'fallback'};if(world.merchant.mood==='nervous')return{label:'question merchant',score:.8,source:'fallback'};return{label:actions[0],score:.55,source:'fallback'}}
    async function loadModel(){if(chooser||loading)return;loading=true;loadBtn.disabled=true;setStatus('loading');setProgress(.03);say(`Loading ${MODEL_ID} for zero-shot action choice.`);try{const mod=await import(TRANSFORMERS_URL);const{pipeline,env}=mod;env.allowLocalModels=false;env.useBrowserCache=true;chooser=await pipeline('zero-shot-classification',MODEL_ID,{progress_callback:e=>{if(e?.progress!=null)setProgress(Number(e.progress)/100)}});setProgress(1);setStatus('loaded');stepBtn.disabled=false;disposeBtn.disabled=false;say('ONNX choice model loaded.')}catch(error){errorPanel.hidden=false;errorPanel.textContent=String(error?.stack||error?.message||error);setStatus('load-failed');stepBtn.disabled=false;say('Model load failed; fallback policy remains available.')}finally{loading=false;loadBtn.disabled=false}}
    async function askAgent(){world.tick++;stepBtn.disabled=true;const premise=visibleState();const labels=availableActions();visionEl.textContent=premise;choicesEl.textContent=labels.join(' · ');try{let choice;if(chooser){setStatus('thinking');const out=await chooser(premise,labels,{hypothesis_template:'The guard should {}.'});choice={label:out.labels[0],score:out.scores[0],source:'onnx'}}else choice=fallbackChoice();world.lastChoice=choice;actionMap[choice.label]?.();say(`${choice.source.toUpperCase()} chose: ${choice.label} (${Number(choice.score).toFixed(2)})`);setStatus(chooser?'loaded':'fallback')}catch(error){errorPanel.hidden=false;errorPanel.textContent=String(error?.stack||error?.message||error);const choice=fallbackChoice();world.lastChoice=choice;actionMap[choice.label]?.();say(`FALLBACK chose after error: ${choice.label}`);setStatus('error')}finally{stepBtn.disabled=false}}
    function dispose(){chooser?.dispose?.();chooser=null;setProgress(0);setStatus('disposed');disposeBtn.disabled=true;stepBtn.disabled=true;say('Disposed ONNX choice model session.')}function steal(){world.apple.stolen=true;world.facts.unshift('player stole apple');world.guard.bubble='Something changed.';say('Player stole apple.')}function returnApple(){world.apple.stolen=false;world.facts.unshift('player returned apple');world.guard.bubble='Apple returned.';say('Player returned apple.')}
    loadBtn.onclick=loadModel;stepBtn.onclick=askAgent;disposeBtn.onclick=dispose;stealBtn.onclick=steal;returnBtn.onclick=returnApple;
    function resize(){const dpr=Math.min(devicePixelRatio||1,2);canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();
    function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);ctx.fillStyle='#07110f';ctx.fillRect(0,0,innerWidth,innerHeight);ctx.strokeStyle='rgba(255,227,109,.10)';for(let i=0;i<18;i++){ctx.beginPath();ctx.arc(innerWidth/2,innerHeight/2,90+i*34,0,Math.PI*2);ctx.stroke()}const ents=[['player',world.player],['guard',world.guard],['merchant',world.merchant],['apple',world.apple],['gate',world.gate]];for(const[id,e]of ents){ctx.beginPath();ctx.fillStyle=id==='apple'?(world.apple.stolen?'#50302e':'#ff5f53'):id==='guard'?'#ffe36d':id==='merchant'?'#8df2bd':id==='gate'?(world.gate.locked?'#b9c7ff':'#8df2bd'):'#f7f3df';ctx.arc(e.x,e.y,26,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f7f3df';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText(e.label,e.x,e.y+44)}ctx.fillStyle='rgba(4,7,6,.72)';ctx.strokeStyle='rgba(255,227,109,.45)';ctx.beginPath();ctx.roundRect(world.guard.x-120,world.guard.y-100,250,54,14);ctx.fill();ctx.stroke();ctx.fillStyle='#ffe36d';ctx.textAlign='left';ctx.font='13px system-ui';ctx.fillText('Guard: '+world.guard.bubble,world.guard.x-106,world.guard.y-68);requestAnimationFrame(draw)}draw();visionEl.textContent=visibleState();choicesEl.textContent=availableActions().join(' · ');
    window.GameHost={getState:()=>JSON.parse(JSON.stringify(world)),loadModel,askAgent,dispose,steal,returnApple};
  </script>
</body>
</html>
