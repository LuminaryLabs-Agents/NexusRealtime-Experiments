<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fogline Relay · NexusRealtime Experiment</title>
  <style>
    :root{color-scheme:dark;--panel:rgba(4,3,12,.84);--text:#fffaf0;--muted:#ffe3a3;--cyan:#9deaff}
    html, body { margin: 0; height: 100%; overflow: hidden; background: #04070a; color: var(--text); font-family: system-ui, sans-serif; }
    #app, #game, #hud { position: fixed; inset: 0; }
    #game { display: block; width: 100vw; height: 100vh; }
    #hud { pointer-events: none; color:var(--text); text-shadow:0 2px 14px rgba(0,0,0,.82); }
    #status { position: fixed; left: 16px; top: 14px; padding:8px 11px; border-radius:999px; background:var(--panel); box-shadow:0 18px 60px rgba(0,0,0,.42),inset 0 0 0 1px rgba(255,255,255,.18); -webkit-backdrop-filter:blur(16px) saturate(1.25); backdrop-filter:blur(16px) saturate(1.25); font-size: 13px; font-weight:850; letter-spacing: .02em; color: var(--text); }
    #prompt { position: fixed; left: 50%; bottom: 54px; transform: translateX(-50%); padding: 8px 12px; border:0; border-radius: 999px; background: rgba(4,3,12,.86); color: #ffffff; font-size: 13px; font-weight:750; box-shadow:0 18px 60px rgba(0,0,0,.42),inset 0 0 0 1px rgba(255,255,255,.18); -webkit-backdrop-filter:blur(16px) saturate(1.25); backdrop-filter:blur(16px) saturate(1.25); }
    #controls { position: fixed; left: 14px; bottom: 10px; padding:7px 10px; border-radius:999px; background:rgba(4,3,12,.78); font-size: 12px; font-weight:700; color: var(--muted); box-shadow:0 12px 42px rgba(0,0,0,.34),inset 0 0 0 1px rgba(255,255,255,.14); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); }
    #errorPanel { position: fixed; inset: 32px; z-index: 5; padding: 22px; border:0; border-radius: 18px; background: rgba(42,4,2,.94); color:#fff1ea; overflow: auto; box-shadow:0 22px 80px rgba(0,0,0,.54),inset 0 0 0 1px rgba(255,210,190,.22); }
    #errorPanel[hidden] { display: none; }
    #errorPanel h2 { margin-top: 0; }
    #errorText { white-space: pre-wrap; }
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <main id="app">
    <canvas id="game" role="application" aria-label="Fogline Relay game canvas"></canvas>
    <aside id="hud" aria-label="Game HUD">
      <header id="status" aria-live="polite">Loading…</header>
      <section id="prompt" aria-live="polite">Booting NexusRealtime kits…</section>
      <footer id="controls">WASD move · mouse/←→ look · hold E scan · R restart · click canvas to lock</footer>
    </aside>
    <section id="errorPanel" role="alert" hidden>
      <h2>Could not start Fogline Relay</h2>
      <pre id="errorText"></pre>
    </section>
  </main>
  <script type="module">
    import { attachNexusRealtimePageLoader } from "../_shared/nexus-realtime-page-loader.js";
    attachNexusRealtimePageLoader({ title: "Fogline Relay", loadingLabel: "Loading Fogline Relay" });
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
