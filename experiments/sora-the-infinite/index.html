<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Super Fly</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#07111d;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    main,canvas{position:fixed;inset:0;width:100vw;height:100vh}canvas{display:block}
    #hud{position:fixed;inset:0;pointer-events:none}#top{position:fixed;left:14px;top:12px;padding:8px 10px;border:1px solid rgba(255,255,255,.14);border-radius:10px;background:rgba(2,8,18,.48);font-size:12px;line-height:1.35;backdrop-filter:blur(8px)}
    #bottom{position:fixed;left:14px;bottom:12px;padding:7px 9px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(2,8,18,.34);font-size:11px;opacity:.86}
    #cross{position:fixed;left:50%;top:50%;width:16px;height:16px;margin:-8px 0 0 -8px;border:2px solid rgba(255,255,255,.48);border-radius:50%;box-sizing:border-box;transition:.14s}#cross.flash{transform:scale(1.8);border-color:white}
    #err{position:fixed;left:16px;right:16px;bottom:16px;white-space:pre-wrap;background:rgba(32,5,4,.93);color:#fff0e8;border:1px solid rgba(255,150,100,.55);border-radius:12px;padding:12px;font:12px/1.4 ui-monospace,Menlo,monospace}#err[hidden]{display:none}
  </style>
</head>
<body>
<main><canvas id="game" role="application" aria-label="Super Fly"></canvas><aside id="hud"><header id="top">Booting Super Fly…</header><footer id="bottom">W/S pitch · A/D bank · Space boost · ` debug</footer></aside><div id="cross"></div><section id="err" role="alert" hidden></section></main>
<script type="module">
  import { attachNexusRealtimePageLoader } from "../_shared/nexus-realtime-page-loader.js";
  attachNexusRealtimePageLoader({ title: "Super Fly", loadingLabel: "Loading Super Fly" });
</script>
<script type="module">
const NEXUS_URL="https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusRealtime@0.0.1/src/index.js";
const KIT_URL=new URLSearchParams(location.search).get("kit")||"https://cdn.jsdelivr.net/gh/LuminaryLabs-Agents/NexusRealtime-ProtoKits@d2ea887c2db9405d9684b990ccf918188877bd09/protokits/aerial-flight-kits/index.js";
const canvas=document.querySelector("#game"),topHud=document.querySelector("#top"),err=document.querySelector("#err"),cross=document.querySelector("#cross");
function fatal(e){err.hidden=false;err.textContent=String(e?.stack||e?.message||e);topHud.textContent="Runtime error — see panel"}
function rgb(hex,f=[.16,.32,.2]){const s=String(hex||"").replace("#","");return s.length===6?[parseInt(s.slice(0,2),16)/255,parseInt(s.slice(2,4),16)/255,parseInt(s.slice(4,6),16)/255]:f}
function makeBird(THREE){const root=new THREE.Group(),bodyMat=new THREE.MeshStandardMaterial({color:0xf8f9fa,roughness:.62}),wingMat=new THREE.MeshStandardMaterial({color:0xe4e8ea,roughness:.58});const body=new THREE.ConeGeometry(1.2,5.2,7);body.rotateX(Math.PI/2);root.add(new THREE.Mesh(body,bodyMat));const head=new THREE.Mesh(new THREE.DodecahedronGeometry(.82,0),bodyMat);head.position.set(0,.55,-2.8);root.add(head);function wing(side){const shoulder=new THREE.Group();shoulder.position.set(.72*side,0,-.35);const innerLength=3.8,outerLength=3.25;const innerGeo=new THREE.BoxGeometry(innerLength,.07,1.35);innerGeo.translate(innerLength*.5*side,0,0);shoulder.add(new THREE.Mesh(innerGeo,wingMat));const elbow=new THREE.Group();elbow.position.set(innerLength*side,0,0);const outerGeo=new THREE.BoxGeometry(outerLength,.055,1.02);outerGeo.translate(outerLength*.5*side,0,0);elbow.add(new THREE.Mesh(outerGeo,wingMat));const tip=new THREE.Group();tip.position.set(outerLength*side,0,0);const tipGeo=new THREE.BoxGeometry(.72,.04,.72);tipGeo.translate(.36*side,0,0);tip.add(new THREE.Mesh(tipGeo,wingMat));elbow.add(tip);shoulder.add(elbow);root.add(shoulder);return{shoulder,elbow,tip}}const left=wing(-1),right=wing(1);root.userData.joints={leftShoulder:left.shoulder,rightShoulder:right.shoulder,leftElbow:left.elbow,rightElbow:right.elbow,leftTip:left.tip,rightTip:right.tip};return root}
function applyRigAnimation(bird,animation={}){const joints=bird.userData.joints||{};for(const[id,descriptor]of Object.entries(animation.joints||{})){const joint=joints[id];if(!joint)continue;const r=descriptor.rotation||{};joint.rotation.set(r.x||0,r.y||0,r.z||0)}return animation.bodyOffset||{x:0,y:0,z:0}}
function makePatchGeometry(THREE,p){const seg=p.segments??p.sampleSegments??8,count=(seg+1)*(seg+1),pos=new Float32Array(count*3),col=new Float32Array(count*3),idx=[];const s=p.samples||[];for(let i=0;i<count;i++){const v=s[i]||{x:0,y:0,z:0,biome:"forest"};pos[i*3]=v.x;pos[i*3+1]=v.y;pos[i*3+2]=v.z;const c=rgb(v.biome==="alpine"?"#8fa0a6":v.biome==="shore"?"#d9ad6a":v.biome==="rock"?"#6f7678":"#1f4a29");col[i*3]=c[0];col[i*3+1]=c[1];col[i*3+2]=c[2]}for(let z=0;z<seg;z++)for(let x=0;x<seg;x++){const a=z*(seg+1)+x,b=a+1,c=a+seg+1,d=c+1;idx.push(a,c,b,b,c,d)}const g=new THREE.BufferGeometry();g.setAttribute("position",new THREE.BufferAttribute(pos,3));g.setAttribute("color",new THREE.BufferAttribute(col,3));g.setIndex(idx);g.computeVertexNormals();g.computeBoundingSphere();return g}
function createTerrainMaterial(THREE){return new THREE.ShaderMaterial({vertexColors:true,uniforms:{sunDir:{value:new THREE.Vector3(.2,.8,.35).normalize()},fogColor:{value:new THREE.Color("#ffdfb3")}},vertexShader:`varying vec3 vc;varying vec3 wp;varying vec3 vn;void main(){vc=color;vec4 w=modelMatrix*vec4(position,1.0);wp=w.xyz;vn=normalize(normalMatrix*normal);gl_Position=projectionMatrix*viewMatrix*w;}`,fragmentShader:`varying vec3 vc;varying vec3 wp;varying vec3 vn;uniform vec3 sunDir;uniform vec3 fogColor;float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);float a=h(i),b=h(i+vec2(1.,0.)),c=h(i+vec2(0.,1.)),d=h(i+vec2(1.,1.));return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);}void main(){float macro=n(wp.xz*.0025);float detail=n(wp.xz*.018+macro*2.0);float slope=1.0-max(vn.y,0.0);float light=.48+max(dot(normalize(vn),sunDir),0.0)*.52;vec3 band=vc*(.82+detail*.28)+vec3(macro*.06);band=mix(band,band*.62,slope*.34);float dist=length(wp.xz)*.000035;band=mix(band,fogColor,clamp(dist,0.0,.45));gl_FragColor=vec4(band*light,1.0);}`})}
function createRenderer(THREE){const renderer=new THREE.WebGLRenderer({canvas,antialias:false,powerPreference:"high-performance"});renderer.setPixelRatio(1);renderer.setSize(innerWidth,innerHeight,false);renderer.shadowMap.enabled=false;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.05;const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,12000),cameraPos=new THREE.Vector3(),lookAt=new THREE.Vector3();const hemi=new THREE.HemisphereLight(0xb3e5fc,0xffdfb3,.55),sun=new THREE.DirectionalLight(0xfff8e7,3.6);sun.castShadow=false;scene.add(hemi,sun,sun.target);const fog=new THREE.FogExp2(0xffdfb3,.00055);scene.fog=fog;const skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,uniforms:{topColor:{value:new THREE.Color("#42a5f5")},bottomColor:{value:new THREE.Color("#ffdfb3")},sunColor:{value:new THREE.Color("#fff8e1")},sunDir:{value:new THREE.Vector3(.1,.5,-.4).normalize()}},vertexShader:`varying vec3 v;void main(){vec4 w=modelMatrix*vec4(position,1.);v=w.xyz;gl_Position=projectionMatrix*viewMatrix*w;}`,fragmentShader:`varying vec3 v;uniform vec3 topColor,bottomColor,sunColor,sunDir;float wave(float x){return sin(x*5.1)*.5+sin(x*11.3)*.25+sin(x*19.7)*.12;}void main(){vec3 d=normalize(v);float h=max(0.,d.y);vec3 sky=mix(bottomColor,topColor,smoothstep(-.15,.75,h));float a=atan(d.x,d.z);float ridge=wave(a)+.42;float horizon=1.0-smoothstep(.015,.13,abs(d.y-ridge*.025));vec3 mountains=mix(vec3(.10,.15,.17),vec3(.35,.42,.44),smoothstep(.0,.08,d.y));sky=mix(sky,mountains,horizon*.42);float sd=max(0.,dot(d,sunDir));gl_FragColor=vec4(sky+sunColor*(pow(sd,80.)*.45+pow(sd,8.)*.3+smoothstep(.996,.998,sd)),1.);}`});scene.add(new THREE.Mesh(new THREE.SphereGeometry(9000,40,18),skyMat));const terrainMat=createTerrainMaterial(THREE),ringMat=new THREE.MeshBasicMaterial({color:0x00f3ff,transparent:true,opacity:.78,wireframe:true}),liftMat=new THREE.MeshBasicMaterial({color:0x3dfa99,transparent:true,opacity:.07,wireframe:true,side:THREE.DoubleSide});const bird=makeBird(THREE);scene.add(bird);const patches=new Map(),rings=new Map(),lifts=new Map();let lastHudAt=0;function draw(s){if(!s?.body)return;const liveP=new Set();for(const p of s.world?.patches||[]){const key=p.id||p.key,rev=p.revision||`${key}:${p.sampleSegments||0}`;liveP.add(key);let rec=patches.get(key);if(!rec||rec.rev!==rev){if(rec){scene.remove(rec.mesh);rec.mesh.geometry.dispose()}const mesh=new THREE.Mesh(makePatchGeometry(THREE,p),terrainMat);mesh.receiveShadow=false;scene.add(mesh);patches.set(key,{rev,mesh})}}for(const[k,rec]of patches)if(!liveP.has(k)){scene.remove(rec.mesh);rec.mesh.geometry.dispose();patches.delete(k)}const liveR=new Set();for(const q of s.checkpoints?.volumes||[]){if(q.collected)continue;liveR.add(q.id);let m=rings.get(q.id);if(!m){m=new THREE.Mesh(new THREE.TorusGeometry(q.radius,1.1,6,16),ringMat);rings.set(q.id,m);scene.add(m)}m.position.set(q.x,q.y,q.z);m.rotation.y=q.rotationY||0}for(const[k,m]of rings)if(!liveR.has(k)){scene.remove(m);m.geometry.dispose();rings.delete(k)}const liveL=new Set();for(const q of s.liftVolumes?.volumes||[]){liveL.add(q.id);let m=lifts.get(q.id);if(!m){m=new THREE.Mesh(new THREE.CylinderGeometry(q.radius,q.radius,q.height,8,1,true),liftMat);lifts.set(q.id,m);scene.add(m)}m.position.set(q.x,q.y+q.height/2,q.z)}for(const[k,m]of lifts)if(!liveL.has(k)){scene.remove(m);m.geometry.dispose();lifts.delete(k)}const b=s.body,offset=applyRigAnimation(bird,s.rig?.animation);bird.position.set(b.position.x+(offset.x||0),b.position.y+(offset.y||0),b.position.z+(offset.z||0));bird.rotation.set(b.rotation.pitch||0,b.rotation.yaw||0,b.rotation.roll||0,"YXZ");const cam=s.camera||{};if(cam.position){cameraPos.set(cam.position.x,cam.position.y,cam.position.z);camera.position.lerp(cameraPos,.16)}if(cam.lookAt){lookAt.set(cam.lookAt.x,cam.lookAt.y,cam.lookAt.z);camera.lookAt(lookAt)}const nextFov=cam.fov||65;if(Math.abs(camera.fov-nextFov)>.02){camera.fov+=(nextFov-camera.fov)*.12;camera.updateProjectionMatrix()}const sd=s.sky?.sunDirection;if(sd){sun.position.set(b.position.x+sd.x*300,b.position.y+sd.y*300,b.position.z+sd.z*300);sun.target.position.set(b.position.x,b.position.y,b.position.z);sun.target.updateMatrixWorld()}fog.color.set(s.sky?.horizonColor||0xffdfb3);fog.density=s.sky?.hazeDensity||.00055;cross.classList.toggle("flash",(s.vfx?.boostFlash||0)>.2);const t=performance.now();if(t-lastHudAt>140){lastHudAt=t;const stats=s.world?.streamingStats||{},lod=stats.lodCounts||{},pose=s.rig?.animation?.pose?.mode||"rig";topHud.innerHTML=`Super Fly · ${s.challenge?.prompt||"Fly"}<br>Speed: ${Math.round(b.speed||0)} · Alt: ${Math.round(b.altitude||0)} · Pose: ${pose}<br>Patches: ${s.world?.patchCount??0} · N/M/F: ${lod.near??0}/${lod.mid??0}/${lod.far??0} · Q: ${stats.pending??0}`;}renderer.render(scene,camera)}function resize(){renderer.setSize(innerWidth,innerHeight,false);camera.aspect=innerWidth/Math.max(1,innerHeight);camera.updateProjectionMatrix()}return{draw,renderer,resize}}
async function boot(){try{const[THREE,Nexus,Aerial]=await Promise.all([import("https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"),import(NEXUS_URL),import(KIT_URL)]);const engine=Nexus.createRealtimeGame({kits:Aerial.createGenericAerialAdventureKits(Nexus,{seed:new URLSearchParams(location.search).get("seed")||"super-fly",terrain:{heightScale:155,scale:.00145,waterLevel:-45,shoreline:-35,timberline:140,patchSize:900,sampleSegments:14,renderDistance:1,scatterDensity:.00002},world:{quality:"adaptive",preloadSeconds:4.5,forwardPreloadBias:.72,maxPatchBuildsPerTick:1,initialPatchBuilds:4,maxCachedPatches:76,detailNoiseScale:.018,macroNoiseScale:.0026,horizonMountainScale:.2,lodRings:[{id:"near",radius:1,patchSize:900,sampleSegments:14,collision:true,scatterDensity:.00002},{id:"mid",radius:2,patchSize:1800,sampleSegments:7,collision:false,scatterDensity:.000004},{id:"far",radius:2,patchSize:3600,sampleSegments:3,collision:false,scatterDensity:0}]},rig:{wingSpan:8.9,innerWingLength:3.8,outerWingLength:3.25,baseFlapRate:3.05,speedFlapRate:.012,maxAmplitude:.72,tipLag:.58,tipFold:.78,boostAmplitude:.3,climbAmplitude:.26,glideFlattening:.9},physics:{maxSpeed:145},checkpoints:{count:72,radius:18,density:2},liftVolumes:{count:42,lift:15.5,density:1},challenge:{targetCheckpoints:12}})});const view=createRenderer(THREE),keys=new Set();addEventListener("keydown",e=>{keys.add(e.code);if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code))e.preventDefault();if(e.code==="Backquote")console.log(window.GameHost.getState(),window.GameHost.getStreamingState())});addEventListener("keyup",e=>keys.delete(e.code));addEventListener("blur",()=>keys.clear());addEventListener("resize",()=>view.resize());window.GameHost={engine,renderer:view,getState:()=>engine.genericAerialRenderDescriptor?.getState?.(),getRawState:()=>engine.genericAerialRenderDescriptor?.getRawState?.(),getRigState:()=>engine.rigAnimationDescriptor?.getState?.(),getStreamingState:()=>engine.terrainStreamer?.getStats?.()??engine.genericWorldPatch?.getStreamingState?.(),setTerrainQuality:(tier)=>engine.terrainStreamer?.setQuality?.(tier),forceTerrainRebuild:()=>engine.terrainStreamer?.forceRebuild?.()};let last=performance.now();function frame(t){try{const d=Math.min(1/30,(t-last)/1000||1/60);last=t;engine.genericFlightInput.setInput({pitch:(keys.has("KeyW")||keys.has("ArrowUp")?1:0)-(keys.has("KeyS")||keys.has("ArrowDown")?1:0),bank:(keys.has("KeyA")||keys.has("ArrowLeft")?1:0)-(keys.has("KeyD")||keys.has("ArrowRight")?1:0),boost:keys.has("Space")});engine.tick(d);view.draw(engine.genericAerialRenderDescriptor.getState());requestAnimationFrame(frame)}catch(e){fatal(e)}}requestAnimationFrame(frame)}catch(e){fatal(e)}}boot();
</script>
