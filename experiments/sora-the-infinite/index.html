<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sora The Infinite</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#07111d;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    main,canvas{position:fixed;inset:0;width:100vw;height:100vh}canvas{display:block;cursor:none}
    #hud{position:fixed;inset:0;pointer-events:none}#top{position:fixed;left:14px;top:12px;padding:8px 10px;border:1px solid rgba(255,255,255,.14);border-radius:10px;background:rgba(2,8,18,.42);font-size:12px;line-height:1.35;backdrop-filter:blur(8px)}
    #bottom{position:fixed;left:14px;bottom:12px;padding:7px 9px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(2,8,18,.28);font-size:11px;opacity:.82}
    #cross{position:fixed;left:50%;top:50%;width:14px;height:14px;margin:-7px 0 0 -7px;border:2px solid rgba(255,255,255,.42);border-radius:50%;box-sizing:border-box;transition:.14s}#cross.flash{transform:scale(1.7);border-color:white}
    #err{position:fixed;left:16px;right:16px;bottom:16px;white-space:pre-wrap;background:rgba(32,5,4,.93);color:#fff0e8;border:1px solid rgba(255,150,100,.55);border-radius:12px;padding:12px;font:12px/1.4 ui-monospace,Menlo,monospace}#err[hidden]{display:none}
  </style>
</head>
<body>
  <main>
    <canvas id="game" role="application" aria-label="Sora The Infinite"></canvas>
    <aside id="hud"><header id="top">Booting Sora…</header><footer id="bottom">W/S pitch · A/D bank · Space boost · R reset</footer></aside>
    <div id="cross"></div><section id="err" role="alert" hidden></section>
  </main>
  <script type="module">
    import { attachNexusRealtimePageLoader } from "../_shared/nexus-realtime-page-loader.js";
    attachNexusRealtimePageLoader({ title: "Sora The Infinite", loadingLabel: "Loading Sora" });
  </script>
  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { SORA_BIRD_SCALE } from "./bird-scale.js";

    const NEXUS_URL = "https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusRealtime@main/src/index.js";
    const KIT_URL = new URLSearchParams(location.search).get("kit") || "https://cdn.jsdelivr.net/gh/LuminaryLabs-Agents/NexusRealtime-ProtoKits@main/protokits/aerial-flight-kits/index.js";
    const canvas = document.querySelector("#game");
    const topHud = document.querySelector("#top");
    const err = document.querySelector("#err");
    const cross = document.querySelector("#cross");

    function fatal(error) {
      err.hidden = false;
      err.textContent = String(error?.stack || error?.message || error);
      topHud.textContent = "Runtime error — see panel";
    }

    function rgb(hex, fallback = [0.16, 0.32, 0.2]) {
      const s = String(hex || "").replace("#", "");
      return s.length === 6 ? [parseInt(s.slice(0,2),16)/255, parseInt(s.slice(2,4),16)/255, parseInt(s.slice(4,6),16)/255] : fallback;
    }

    function makeBird(T, scale = SORA_BIRD_SCALE) {
      const bodyLength = scale.bodyLengthM ?? 0.5;
      const bodyRadius = scale.bodyRadiusM ?? bodyLength * 0.14;
      const headRadius = scale.headRadiusM ?? bodyLength * 0.16;
      const shoulderWidth = scale.shoulderWidthM ?? bodyRadius * 2.3;
      const inner = scale.innerWingLengthM ?? (scale.wingspanM ?? 1.3) * 0.26;
      const outer = scale.outerWingLengthM ?? (scale.wingspanM ?? 1.3) * 0.18;
      const tipLength = scale.tipLengthM ?? 0.08;
      const thick = scale.wingThicknessM ?? 0.012;
      const r = new T.Group();
      r.userData.scaleConvention = scale;
      const bm = new T.MeshStandardMaterial({ color: 0xf8f9fa, roughness: 0.62 });
      const wm = new T.MeshStandardMaterial({ color: 0xe4e8ea, roughness: 0.58 });
      const body = new T.ConeGeometry(bodyRadius, bodyLength, 8);
      body.rotateX(Math.PI / 2);
      r.add(new T.Mesh(body, bm));
      const head = new T.Mesh(new T.DodecahedronGeometry(headRadius, 0), bm);
      head.position.set(0, bodyRadius * 0.6, -bodyLength * 0.58);
      r.add(head);
      function wing(side) {
        const sh = new T.Group();
        sh.position.set((shoulderWidth * 0.5) * side, 0, -bodyLength * 0.08);
        const ig = new T.BoxGeometry(inner, thick, bodyLength * 0.24);
        ig.translate(inner * 0.5 * side, 0, 0);
        sh.add(new T.Mesh(ig, wm));
        const el = new T.Group();
        el.position.set(inner * side, 0, 0);
        const og = new T.BoxGeometry(outer, thick * 0.8, bodyLength * 0.18);
        og.translate(outer * 0.5 * side, 0, 0);
        el.add(new T.Mesh(og, wm));
        const tip = new T.Group();
        tip.position.set(outer * side, 0, 0);
        const tg = new T.BoxGeometry(tipLength, thick * 0.7, bodyLength * 0.13);
        tg.translate(tipLength * 0.5 * side, 0, 0);
        tip.add(new T.Mesh(tg, wm));
        el.add(tip); sh.add(el); r.add(sh);
        return { sh, el, tip };
      }
      const l = wing(-1), ri = wing(1);
      r.userData.joints = { leftShoulder: l.sh, rightShoulder: ri.sh, leftElbow: l.el, rightElbow: ri.el, leftTip: l.tip, rightTip: ri.tip };
      r.scale.setScalar(scale.visualScale ?? 1);
      return r;
    }

    function applyRig(bird, anim = {}) {
      const joints = bird.userData.joints || {};
      for (const [id, d] of Object.entries(anim.joints || {})) {
        const joint = joints[id];
        if (!joint) continue;
        const q = d.rotation || {};
        joint.rotation.set(q.x || 0, q.y || 0, q.z || 0);
      }
      return anim.bodyOffset || { x: 0, y: 0, z: 0 };
    }

    function patchGeo(T, p) {
      const seg = p.segments ?? p.sampleSegments ?? 8;
      const count = (seg + 1) * (seg + 1);
      const pos = new Float32Array(count * 3);
      const col = new Float32Array(count * 3);
      const idx = [];
      const samples = p.samples || [];
      for (let i = 0; i < count; i++) {
        const v = samples[i] || { x: 0, y: 0, z: 0, biome: "forest" };
        pos[i*3] = v.x; pos[i*3+1] = v.y; pos[i*3+2] = v.z;
        const c = rgb(v.biome === "alpine" ? "#8fa0a6" : v.biome === "shore" ? "#d9ad6a" : v.biome === "rock" ? "#6f7678" : "#1f4a29");
        col[i*3] = c[0]; col[i*3+1] = c[1]; col[i*3+2] = c[2];
      }
      for (let z = 0; z < seg; z++) for (let x = 0; x < seg; x++) {
        const a = z * (seg + 1) + x, b = a + 1, c = a + seg + 1, d = c + 1;
        idx.push(a, c, b, b, c, d);
      }
      const g = new T.BufferGeometry();
      g.setAttribute("position", new T.BufferAttribute(pos, 3));
      g.setAttribute("color", new T.BufferAttribute(col, 3));
      g.setIndex(idx); g.computeVertexNormals(); g.computeBoundingSphere();
      return g;
    }

    function createRenderer(T) {
      const renderer = new T.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 1.5));
      renderer.setSize(innerWidth, innerHeight, false);
      renderer.toneMapping = T.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;
      const scene = new T.Scene();
      scene.fog = new T.FogExp2(0xffdfb3, 0.00055);
      const camera = new T.PerspectiveCamera(65, innerWidth / innerHeight, 0.03, 12000);
      const hemi = new T.HemisphereLight(0xb3e5fc, 0xffdfb3, 0.65);
      const sun = new T.DirectionalLight(0xfff8e7, 3.4);
      scene.add(hemi, sun, sun.target);
      const skyMat = new T.ShaderMaterial({ side: T.BackSide, depthWrite: false, uniforms: { topColor: { value: new T.Color("#42a5f5") }, bottomColor: { value: new T.Color("#ffdfb3") } }, vertexShader: `varying vec3 v;void main(){v=(modelMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*viewMatrix*vec4(v,1.);}`, fragmentShader: `varying vec3 v;uniform vec3 topColor,bottomColor;void main(){vec3 d=normalize(v);float h=max(0.,d.y);vec3 col=mix(bottomColor,topColor,smoothstep(-.1,.9,h));float sun=pow(max(0.,dot(d,normalize(vec3(.25,.55,-.35)))),32.);gl_FragColor=vec4(col+vec3(1.,.86,.45)*sun*.8,1.);}` });
      scene.add(new T.Mesh(new T.SphereGeometry(9000, 40, 18), skyMat));
      const terrainMat = new T.MeshStandardMaterial({ vertexColors: true, roughness: 0.92, metalness: 0.02 });
      const ringMat = new T.MeshBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.78, wireframe: true });
      const liftMat = new T.MeshBasicMaterial({ color: 0x3dfa99, transparent: true, opacity: 0.07, wireframe: true, side: T.DoubleSide });
      const bird = makeBird(T, SORA_BIRD_SCALE);
      scene.add(bird);
      const patches = new Map(), rings = new Map(), lifts = new Map();
      let lastHudAt = 0;
      function draw(s) {
        if (!s?.body) return;
        const liveP = new Set();
        for (const p of s.world?.patches || []) {
          const key = p.id || p.key;
          const rev = p.revision || `${key}:${p.sampleSegments || 0}`;
          liveP.add(key);
          let rec = patches.get(key);
          if (!rec || rec.rev !== rev) {
            if (rec) { scene.remove(rec.mesh); rec.mesh.geometry.dispose(); }
            const mesh = new T.Mesh(patchGeo(T, p), terrainMat);
            scene.add(mesh); patches.set(key, { rev, mesh });
          }
        }
        for (const [k, rec] of patches) if (!liveP.has(k)) { scene.remove(rec.mesh); rec.mesh.geometry.dispose(); patches.delete(k); }
        const liveR = new Set();
        for (const q of s.checkpoints?.volumes || []) {
          if (q.collected) continue;
          liveR.add(q.id);
          let mesh = rings.get(q.id);
          if (!mesh) { mesh = new T.Mesh(new T.TorusGeometry(q.radius, 0.8, 6, 24), ringMat); rings.set(q.id, mesh); scene.add(mesh); }
          mesh.position.set(q.x, q.y, q.z); mesh.rotation.y = q.rotationY || 0;
        }
        for (const [k, mesh] of rings) if (!liveR.has(k)) { scene.remove(mesh); mesh.geometry.dispose(); rings.delete(k); }
        const liveL = new Set();
        for (const q of s.liftVolumes?.volumes || []) {
          liveL.add(q.id);
          let mesh = lifts.get(q.id);
          if (!mesh) { mesh = new T.Mesh(new T.CylinderGeometry(q.radius, q.radius, q.height, 10, 1, true), liftMat); lifts.set(q.id, mesh); scene.add(mesh); }
          mesh.position.set(q.x, q.y + q.height / 2, q.z);
        }
        for (const [k, mesh] of lifts) if (!liveL.has(k)) { scene.remove(mesh); mesh.geometry.dispose(); lifts.delete(k); }
        const b = s.body;
        const off = applyRig(bird, s.rig?.animation);
        bird.position.set(b.position.x + (off.x || 0), b.position.y + (off.y || 0), b.position.z + (off.z || 0));
        bird.rotation.set(b.rotation.pitch || 0, b.rotation.yaw || 0, b.rotation.roll || 0, "YXZ");
        const cam = s.camera || {};
        if (cam.position) camera.position.lerp(new T.Vector3(cam.position.x, cam.position.y, cam.position.z), 0.18);
        if (cam.lookAt) camera.lookAt(cam.lookAt.x, cam.lookAt.y, cam.lookAt.z);
        if (cam.fov && Math.abs(camera.fov - cam.fov) > 0.02) { camera.fov += (cam.fov - camera.fov) * 0.12; camera.updateProjectionMatrix(); }
        const sky = s.sky || {};
        skyMat.uniforms.topColor.value.set(sky.topColor || "#42a5f5");
        skyMat.uniforms.bottomColor.value.set(sky.horizonColor || "#ffdfb3");
        hemi.color.set(sky.ambientColor || 0xb3e5fc); hemi.intensity = sky.ambientIntensity ?? 0.6;
        sun.color.set(sky.sunColor || 0xfff8e7); sun.intensity = sky.sunIntensity ?? 3.4;
        const sd = sky.sunDirection || { x: 0.25, y: 0.55, z: -0.35 };
        sun.position.set(b.position.x + sd.x * 300, b.position.y + sd.y * 300, b.position.z + sd.z * 300);
        sun.target.position.set(b.position.x, b.position.y, b.position.z); sun.target.updateMatrixWorld();
        cross.classList.toggle("flash", (s.vfx?.boostFlash || 0) > 0.2);
        const t = performance.now();
        if (t - lastHudAt > 160) {
          lastHudAt = t;
          topHud.innerHTML = `Sora The Infinite · ${(s.challenge?.prompt || "Fly")}<br>Bird: ${SORA_BIRD_SCALE.bodyLengthM}m body · ${SORA_BIRD_SCALE.wingspanM}m wingspan<br>Speed: ${Math.round(b.speed || 0)} · Alt: ${Math.round(b.altitude || 0)} · Rings: ${s.challenge?.checkpoints ?? 0}/${s.challenge?.targetCheckpoints ?? 12}`;
        }
        renderer.render(scene, camera);
      }
      function resize() { renderer.setSize(innerWidth, innerHeight, false); camera.aspect = innerWidth / Math.max(1, innerHeight); camera.updateProjectionMatrix(); }
      addEventListener("resize", resize); resize();
      return { draw, renderer, resize };
    }

    async function boot() {
      try {
        const [NexusRealtime, Aerial] = await Promise.all([import(NEXUS_URL), import(KIT_URL)]);
        const engine = Aerial.createGenericAerialAdventureGame(NexusRealtime, {
          seed: "sora-meter-scale",
          body: { spawnAltitude: 80 },
          physics: { clearance: 0.7, minForwardSpeed: 10, maxSpeed: 52, gravity: 0.82, lift: 4.2, dragCoeff: 0.0008, diveAcceleration: 14 },
          camera: { distance: 3.2, height: 0.85, lookAhead: 5.5, pitchPullback: 0.45, fov: 62, speedFovBoost: 7 },
          rig: { unit: "meter", bodyLengthM: 0.5, wingspanM: 1.3, wingSpan: 1.3, innerWingLength: 0.34, outerWingLength: 0.24, baseFlapRate: 3.15, maxAmplitude: 0.68 },
          checkpoints: { count: 30, range: 1800, minHeight: 35, heightRange: 95, radius: 7, impulse: 8 },
          liftVolumes: { count: 22, range: 1700, radius: 16, height: 95, lift: 6.5 },
          world: { renderDistance: 1, patchSize: 300, sampleSegments: 24, scatterDensity: 0.000035 },
          terrain: { renderDistance: 1, patchSize: 300, sampleSegments: 24, heightScale: 68, waterLevel: -35, timberline: 80 },
          sky: { dayNightCycle: true, dayLengthSeconds: 600 }
        });
        engine.genericAerialBody?.reset?.({ altitude: 80, speed: 24 });
        const renderer = createRenderer(THREE);
        const keys = new Set();
        addEventListener("keydown", (e) => { keys.add(e.key.toLowerCase()); if (e.code === "Space") e.preventDefault(); if (e.key.toLowerCase() === "r") engine.genericAerialBody?.reset?.({ altitude: 80, speed: 24 }); });
        addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));
        addEventListener("blur", () => keys.clear());
        window.GameHost = { engine, renderer, birdScale: SORA_BIRD_SCALE, getState: () => engine.genericAerialBody.getState() };
        let last = performance.now();
        function frame(now) {
          const dt = Math.min(1 / 30, (now - last) / 1000 || 1 / 60); last = now;
          engine.genericFlightInput.setInput({
            pitch: (keys.has("s") || keys.has("arrowdown") ? 1 : 0) - (keys.has("w") || keys.has("arrowup") ? 1 : 0),
            bank: (keys.has("d") || keys.has("arrowright") ? 1 : 0) - (keys.has("a") || keys.has("arrowleft") ? 1 : 0),
            brake: keys.has("shift") ? 1 : 0,
            boost: keys.has(" ") || keys.has("space")
          });
          engine.tick(dt);
          renderer.draw(engine.genericAerialBody.getState());
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
      } catch (e) { fatal(e); }
    }
    boot();
  </script>
</body>
</html>
