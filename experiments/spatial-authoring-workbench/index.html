<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Spatial Authoring Workbench · PICO WebXR</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #070b12; color: #eef6ff; font-family: system-ui, sans-serif; }
    main, canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
    canvas { display: block; }
    #hud { position: fixed; inset: 0; pointer-events: none; }
    #status { position: fixed; left: 16px; top: 16px; max-width: 48rem; padding: 10px 12px; border: 1px solid rgba(255,255,255,.16); background: rgba(8,14,24,.72); border-radius: 12px; font-size: 13px; line-height: 1.35; backdrop-filter: blur(10px); }
    #enterXR { position: fixed; left: 16px; bottom: 16px; pointer-events: auto; padding: 12px 16px; border: 0; border-radius: 999px; background: #dff7ff; color: #061018; font-weight: 800; cursor: pointer; }
    #errorPanel { position: fixed; left: 16px; right: 16px; bottom: 76px; max-height: 42vh; overflow: auto; white-space: pre-wrap; color: #ffdede; background: rgba(80,0,0,.84); border: 1px solid rgba(255,120,120,.45); padding: 12px; border-radius: 12px; font: 12px/1.4 ui-monospace, SFMono-Regular, Consolas, monospace; }
    #errorPanel[hidden] { display: none; }
  </style>
</head>
<body>
  <main id="app">
    <canvas id="xr-canvas" aria-label="Spatial Authoring Workbench scene"></canvas>
    <aside id="hud" aria-label="diagnostics">
      <section id="status" aria-live="polite">Booting Spatial Authoring Workbench…</section>
      <button id="enterXR" type="button">Enter hand-tracking XR</button>
      <section id="errorPanel" role="alert" hidden></section>
    </aside>
  </main>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
