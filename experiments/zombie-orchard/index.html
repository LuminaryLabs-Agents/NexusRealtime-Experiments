<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Zombie Orchard</title><style>html,body{margin:0;height:100%;background:#050606;color:#f7efe3;font-family:system-ui,sans-serif;overflow:hidden}#game-root{position:fixed;inset:0}canvas{width:100%;height:100%;display:block}.hud{position:absolute;left:18px;top:18px;display:grid;gap:8px;min-width:260px;padding:14px;border:1px solid #ffe3ae2e;border-radius:18px;background:#090806b0}.row{display:flex;justify-content:space-between;gap:16px;font-size:13px}#message{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);padding:12px 16px;border-radius:999px;background:#090806b0}footer{position:fixed;left:0;right:0;bottom:0;padding:8px;background:#0008;text-align:center;font-size:12px}</style></head><body><section id="game-root"><canvas id="orchard-canvas"></canvas><aside class="hud"><h1>Zombie Orchard</h1><div class="row"><span>Round</span><strong id="round">-</strong></div><div class="row"><span>Score</span><strong id="score">0</strong></div><div class="row"><span>Apples</span><strong id="apples">0</strong></div><div class="row"><span>Gear</span><strong id="weapon">empty</strong></div><div class="row"><span>Health</span><strong id="health">100%</strong></div><div class="row"><span>Stamina</span><strong id="stamina">100%</strong></div><div class="row"><span>Pressure</span><strong id="pressure">0%</strong></div></aside><div id="message">Loading kits...</div></section><footer>WASD move | Shift sprint | Space dodge | E collect | Mouse/J use gear | 1 2 3 swap | R next round | P pause</footer><script type="module" src="./src/main.js"></script></body></html>
