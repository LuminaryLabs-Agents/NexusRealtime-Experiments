plugins { id("com.android.application") }

android {
    namespace 'dev.luminarylabs.spatialauthoring.openxr'
    compileSdk 35

    defaultConfig {
        applicationId 'dev.luminarylabs.spatialauthoring.openxr'
        minSdk 29
        targetSdk 35
        versionCode 2
        versionName '0.2.0'
        ndk { abiFilters 'arm64-v8a' }
        externalNativeBuild {
            cmake {
                arguments '-DANDROID_STL=c++_static', '-DANDROID_ARM_NEON=TRUE'
                cppFlags '-std=c++17 -Wall -Wextra -Wno-unused-parameter'
            }
        }
    }

    externalNativeBuild { cmake { path 'src/main/cpp/CMakeLists.txt'; version '3.22.1' } }
}
