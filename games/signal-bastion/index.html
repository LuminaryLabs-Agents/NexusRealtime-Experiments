<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Signal Bastion is a generic NexusRealtime defense game composed from consolidated ProtoKit DSKs." />
  <title>Signal Bastion · NexusRealtime AAA Defense DSKs</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#05080b;color:#ecfbff;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #app,#game,#hud{position:fixed;inset:0}
    #game{display:block;width:100vw;height:100vh;background:#05080b;cursor:crosshair}
    #hud{pointer-events:none}
    #status,#controls{position:fixed;left:14px;z-index:2;padding:7px 10px;border:1px solid rgba(138,220,255,.20);border-radius:999px;background:rgba(1,6,11,.34);color:rgba(236,251,255,.9);font-size:12px;letter-spacing:.02em;text-shadow:0 1px 8px #000;backdrop-filter:blur(8px)}
    #status{top:12px}
    #controls{bottom:12px;color:rgba(236,251,255,.68)}
    #errorPanel{position:fixed;inset:28px;z-index:5;overflow:auto;padding:22px;border:1px solid #ff6b7d;border-radius:18px;background:#270911e6;color:#ffdce2;box-shadow:0 20px 90px rgba(0,0,0,.45)}
    #errorPanel[hidden]{display:none}
    #errorText{white-space:pre-wrap}
  </style>
</head>
<body>
  <main id="app">
    <canvas id="game" role="application" aria-label="Signal Bastion generic defense canvas"></canvas>
    <aside id="hud" aria-label="Game HUD">
      <header id="status" aria-live="polite">Loading NexusRealtime…</header>
      <footer id="controls">Click anchors build/select · 1/2/3 blueprint · U upgrade · Backspace sell · Space wave · R restart</footer>
    </aside>
    <section id="errorPanel" role="alert" hidden>
      <h1>Could not start Signal Bastion</h1>
      <pre id="errorText"></pre>
    </section>
  </main>
  <script type="module" src="./src/boot.js?v=aaa-dsk-phase"></script>
</body>
</html>
